<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyakuzee - Links</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* --- 1. CSS Variables Configuration --- */
        :root {
            --font-main: 'Poppins', sans-serif;
            --font-title: 'Cinzel', serif;
            
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: 12px;
            
            --hover-glow: rgba(255, 255, 255, 0.15);
            --hover-border: rgba(255, 255, 255, 0.4);
        }

        /* --- 2. Base Resets --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            /* overflow: hidden; -> Dihapus agar bisa di-scroll */
            overflow-x: hidden; /* Mencegah scroll menyamping */
            font-family: var(--font-main);
            background-color: #050505;
        }

        /* --- 3. Background & Canvas Effects (Diubah jadi Fixed) --- */
        #bg-image {
            position: fixed; /* Diubah dari absolute ke fixed */
            inset: -5%;
            width: 110%;
            height: 110%;
            background-image: url('https://images.unsplash.com/photo-1528360983277-13d401cdc186?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.35) contrast(1.2);
            transition: transform 0.1s ease-out;
            z-index: 0;
        }

        #rain-canvas {
            position: fixed; /* Diubah dari absolute ke fixed */
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- 4. Component Styles --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .font-title {
            font-family: var(--font-title);
        }

        .link-btn {
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 20px var(--hover-glow);
            background: var(--hover-glow);
            border-color: var(--hover-border);
        }

        /* --- 5. Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
    </style>
</head>
<body class="relative flex items-center justify-center min-h-screen text-white py-12">

    <div id="bg-image"></div>
    <canvas id="rain-canvas"></canvas>

    <main class="relative z-10 w-full max-w-md px-4 my-auto">
        <div class="glass-card rounded-3xl p-8 flex flex-col items-center animate-fade-in">
            
            <div class="relative w-28 h-28 mb-5 group">
                <div class="absolute inset-0 bg-white rounded-full opacity-20 blur-md group-hover:opacity-40 transition-opacity duration-300"></div>
                <img src="webtoon _ season of blossom _ choi jinyoung icon _ pfp.jpeg" alt="Hyakuzee Profile" 
                     class="relative w-full h-full object-cover rounded-full border-2 border-white/40 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
            </div>

            <h1 class="text-3xl font-title tracking-widest font-bold mb-1 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">
                Hyakuzee
            </h1>
            <p class="text-xs text-gray-300 mb-8 tracking-[0.2em] uppercase flex items-center gap-2 text-center">
                <span>⛩️</span> Welcome to my realm <span>⛩️</span>
            </p>

            <nav id="links-container" class="w-full flex flex-col gap-4" aria-label="Social Links">
                </nav>

        </div>
    </main>

    <script>
        /**
         * App Configuration & Data
         */
        const AppConfig = {
            links: [
                {
                    name: "Instagram",
                    url: "https://www.instagram.com/cyan.kaa/",
                    iconClass: "fab fa-instagram",
                    colorClass: "text-pink-500",
                    hoverColorClass: "group-hover:text-pink-400"
                },
                {
                    name: "Discord Server",
                    url: "https://discord.gg/GShmrUJKMF",
                    iconClass: "fab fa-discord",
                    colorClass: "text-indigo-500",
                    hoverColorClass: "group-hover:text-indigo-400"
                },
                {
                    name: "Spotify",
                    url: "https://open.spotify.com/user/312nrmuwxsw2wt6en2kowrzefqbm?si=1230c37156d44d16",
                    iconClass: "fab fa-spotify",
                    colorClass: "text-green-500",
                    hoverColorClass: "group-hover:text-green-400"
                },
                // Contoh link tambahan untuk mengetes fungsi scroll
                {
                    name: "YouTube Channel",
                    url: "https://www.youtube.com/@cyan.kaa22",
                    iconClass: "fab fa-youtube",
                    colorClass: "text-red-500",
                    hoverColorClass: "group-hover:text-red-400"
                },
                {
                    name: "Facebook",
                    url: "https://web.facebook.com/hyakuzee.id",
                    iconClass: "fab fa-facebook",
                    colorClass: "text-cyan-500",
                    hoverColorClass: "group-hover:text-cyan-400"
                },
                {
                    name: "Saweria",
                    url: "https://saweria.co/yfpkuzee",
                    iconClass: "fab fa-circle-heart",
                    colorClass: "text-softpink-500",
                    hoverColorClass: "group-hover:text-softpink-400"
                },
                {
                    name: "X (Twitter)",
                    url: "https://x.com/yfpkuzee",
                    iconClass: "fab fa-twitter",
                    colorClass: "text-darkcyan-500",
                    hoverColorClass: "group-hover:text-darkcyan-400"
                }
            ],
            parallax: {
                intensity: 20,
            },
            rain: {
                dropCount: 150,
                colorRGB: '180, 200, 230',
                angle: 1.5
            }
        };

        /**
         * Link Manager Class
         */
        class LinkRenderer {
            constructor(containerId, linksData) {
                this.container = document.getElementById(containerId);
                this.linksData = linksData;
                this.render();
            }

            render() {
                if (!this.container) return;
                
                const linksHTML = this.linksData.map(link => {
                    return `
                        <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                           class="link-btn flex items-center p-4 rounded-xl border border-white/10 bg-white/5 relative overflow-hidden group">
                            <i class="${link.iconClass} text-2xl w-8 ${link.colorClass} ${link.hoverColorClass} transition-colors"></i>
                            <span class="font-semibold tracking-wide ml-2">${link.name}</span>
                        </a>
                    `;
                }).join('');

                this.container.innerHTML = linksHTML;
            }
        }

        /**
         * Parallax Controller Class
         */
        class ParallaxEffect {
            constructor(elementId, config) {
                this.element = document.getElementById(elementId);
                this.config = config;
                this.init();
            }

            init() {
                if (!this.element) return;
                document.addEventListener('mousemove', this.handleMouseMove.bind(this));
            }

            handleMouseMove(event) {
                const x = (event.clientX / window.innerWidth - 0.5) * this.config.intensity;
                const y = (event.clientY / window.innerHeight - 0.5) * this.config.intensity;
                this.element.style.transform = `translate(${-x}px, ${-y}px) scale(1.05)`;
            }
        }

        /**
         * Raindrop Entity Class
         */
        class Raindrop {
            constructor(canvasWidth, canvasHeight, config) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;
                this.config = config;
                this.reset(true);
            }

            reset(isInitial = false) {
                this.x = Math.random() * this.canvasWidth;
                this.y = isInitial ? Math.random() * this.canvasHeight : -20;
                this.z = Math.random() * 0.6 + 0.2; 
                this.length = Math.random() * 20 + 15;
                this.speed = Math.random() * 10 + 15;
            }

            update(canvasWidth, canvasHeight) {
                this.canvasWidth = canvasWidth;
                this.canvasHeight = canvasHeight;

                this.y += this.speed * this.z;
                this.x -= this.z * this.config.angle; 
                
                if (this.y > this.canvasHeight || this.x < 0) {
                    this.reset();
                }
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - (this.z * this.config.angle), this.y + this.length * this.z);
                ctx.strokeStyle = `rgba(${this.config.colorRGB}, ${this.z * 0.8})`;
                ctx.lineWidth = this.z * 1.5;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        /**
         * Rain Simulator Class
         */
        class RainSimulator {
            constructor(canvasId, config) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.config = config;
                this.raindrops = [];
                
                this.init();
            }

            init() {
                if (!this.canvas) return;
                
                this.handleResize();
                window.addEventListener('resize', this.handleResize.bind(this));
                
                this.createDrops();
                this.animate();
            }

            handleResize() {
                this.width = this.canvas.width = window.innerWidth;
                this.height = this.canvas.height = window.innerHeight;
            }

            createDrops() {
                for (let i = 0; i < this.config.dropCount; i++) {
                    this.raindrops.push(new Raindrop(this.width, this.height, this.config));
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.width, this.height);
                
                this.raindrops.forEach(drop => {
                    drop.update(this.width, this.height);
                    drop.draw(this.ctx);
                });
                
                requestAnimationFrame(this.animate.bind(this));
            }
        }

        /**
         * Application Initialization
         */
        document.addEventListener('DOMContentLoaded', () => {
            new LinkRenderer('links-container', AppConfig.links);
            new ParallaxEffect('bg-image', AppConfig.parallax);
            new RainSimulator('rain-canvas', AppConfig.rain);
        });
    </script>
</body>
</html>
